<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Julia Vaskul</title>
<meta name="description" content="Start a project with Julia Vaskul — AI creative producer for fashion, beauty, and commercial campaigns.">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="site-nav scrolled" id="nav">
  <a class="nav-brand" href="index.html">Julia Vaskul</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="work.html">Work</a></li>
    <li><a href="deep-dive.html">Deep Dive</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
  <button class="nav-toggle" aria-label="Menu">☰</button>
</nav>

<section class="contact-wrap">
  <h1>Start a project</h1>
  <p>Fashion, beauty, or commercial — tell me a little about what you have in mind.</p>

  <form id="contact-form" action="https://formspree.io/f/mdaryzqg" method="POST">
    <input type="hidden" name="_subject" value="New message from Basque Breeze website">
    <div class="form-field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="form-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-field">
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
    </div>
    <button type="submit" class="submit-btn">Send message</button>
  </form>
  <p id="form-status" style="display:none; margin-top:1.6rem; font-size:1rem; line-height:1.8; color:var(--gray-700);"></p>

  <p class="contact-alt">Or reach out directly on <a href="https://www.linkedin.com/in/julia-vaskul-b84625381" target="_blank" rel="noopener">LinkedIn</a>.</p>
</section>

<footer class="site-footer">
  <span>© 2026 Julia Vaskul — Basque Breeze</span>
  <div class="footer-social">
    <a href="https://www.linkedin.com/in/julia-vaskul-b84625381" target="_blank" rel="noopener">LinkedIn</a>
  </div>
</footer>

<script src="js/main.js"></script>
<script>
  const contactForm = document.getElementById('contact-form');
  const formStatus  = document.getElementById('form-status');
  if (contactForm) {
    contactForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const res = await fetch(contactForm.action, {
          method: 'POST',
          body: new FormData(contactForm),
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          contactForm.style.display = 'none';
          formStatus.textContent = 'Thank you — I\'ll be in touch soon.';
        } else {
          formStatus.textContent = 'Something went wrong — please try again or email directly.';
        }
      } catch {
        formStatus.textContent = 'Something went wrong — please try again or email directly.';
      }
      formStatus.style.display = '';
    });
  }
</script>
</body>
</html>
