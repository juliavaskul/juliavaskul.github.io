<section class="contact-wrap">
  <h1>Start a project</h1>
  <p>Fashion, beauty, or commercial — tell me a little about what you have in mind.</p>

  <!-- Replace YOUR_FORM_ID with your Formspree endpoint after registering at formspree.io -->
  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="form-field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-field">
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
    </div>
    <button type="submit" class="submit-btn">Send message</button>
  </form>

  <p class="contact-alt">Or reach out directly on <a href="https://www.linkedin.com/in/julia-vaskul-b84625381" target="_blank" rel="noopener">LinkedIn</a>.</p>
</section>
